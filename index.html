<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교통량 카운터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222;
  --border: #2a2a2a;
  --border2: #333;
  --text: #e8e8e8;
  --text2: #888;
  --text3: #555;
  --accent: #4ade80;
  --accent-dim: rgba(74,222,128,0.12);
  --accent-border: rgba(74,222,128,0.3);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.1);
  --mono: 'DM Mono', monospace;
  --sans: 'Pretendard', -apple-system, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:0.05em;font-weight:500}
.loc-tag{font-size:12px;color:var(--text2);padding:3px 10px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;transition:border-color .2s}
.loc-tag:hover{border-color:var(--accent);color:var(--accent)}
.spacer{flex:1}
.topbar-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border2);border-radius:6px;background:none;color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s}
.topbar-btn:hover{border-color:var(--text2);color:var(--text)}
.topbar-btn.green{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.topbar-btn.green:hover{background:rgba(74,222,128,0.2)}
.topbar-btn.red{border-color:rgba(248,113,113,0.3);color:var(--red)}
.topbar-btn.red:hover{background:var(--red-dim)}

.body{display:flex;flex:1;overflow:hidden}

/* Video panel */
.video-panel{display:flex;flex-direction:column;flex:1;padding:14px;gap:12px;overflow:hidden}
.video-box{background:#000;border-radius:8px;overflow:hidden;position:relative;flex-shrink:0}
.video-box video{width:100%;display:block}
.video-drop{width:100%;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1.5px dashed var(--border2);border-radius:8px;cursor:pointer;transition:all .2s}
.video-drop:hover{border-color:var(--accent);background:var(--accent-dim)}
.video-drop svg{opacity:.4}
.video-drop p{font-size:13px;color:var(--text2)}
.video-drop small{font-size:11px;color:var(--text3)}

.timebar{display:flex;align-items:center;gap:14px;flex-shrink:0}
.timestamp{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--accent);letter-spacing:.05em}
.timebar-actions{display:flex;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px}
.icon-btn:hover{border-color:var(--text2);color:var(--text)}
.icon-btn.flag{border-color:var(--accent-border);color:var(--accent)}
.timebar-right{margin-left:auto;font-size:12px;color:var(--text2)}
.timebar-right strong{color:var(--text);font-weight:500}

/* Log */
.log-section{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.log-head{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-weight:500}
.log-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.log-scroll::-webkit-scrollbar{width:4px}
.log-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.log-item{display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:5px;font-size:12px;transition:background .1s}
.log-item:hover{background:var(--surface2)}
.log-ts{font-family:var(--mono);font-size:11px;color:var(--blue);min-width:54px;flex-shrink:0}
.log-zone{color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-delta{font-family:var(--mono);font-size:11px;font-weight:500;min-width:28px;text-align:right}
.log-delta.up{color:var(--accent)}
.log-delta.down{color:var(--red)}
.log-delta.mark{color:var(--amber)}
.log-empty{font-size:12px;color:var(--text3);text-align:center;padding:20px 0}

/* Right panel */
.right-panel{width:320px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;background:var(--surface)}
.right-panel::-webkit-scrollbar{width:4px}
.right-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.section-label{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.section-badge{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto}

.counter-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px}
.counter-row:hover{background:var(--surface2)}
.counter-name{font-size:13px;flex:1;color:var(--text)}
.counter-ctrl{display:flex;align-items:center;gap:0}
.ctrl-btn{width:30px;height:30px;border:1px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s;color:var(--text2);font-weight:400}
.ctrl-btn:first-child{border-radius:6px 0 0 6px}
.ctrl-btn:last-child{border-radius:0 6px 6px 0}
.ctrl-btn.plus:hover{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.ctrl-btn.minus:hover{background:var(--red-dim);border-color:rgba(248,113,113,.3);color:var(--red)}
.ctrl-btn:active{transform:scale(.92)}
.ctrl-val{font-family:var(--mono);font-size:16px;font-weight:500;min-width:40px;text-align:center;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);height:30px;display:flex;align-items:center;justify-content:center;color:var(--text)}

/* Setup Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:15px;font-weight:500}
.modal-close{width:28px;height:28px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;color:var(--text2);letter-spacing:.05em;text-transform:uppercase}
.field input[type=text],.field input[type=number]{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.item-row{display:flex;gap:6px;align-items:center}
.item-row input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none}
.item-row input:focus{border-color:var(--accent)}
.rm-btn{width:26px;height:26px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rm-btn:hover{background:var(--red-dim);color:var(--red)}
.add-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;padding:4px 0;transition:color .15s}
.add-row:hover{color:var(--accent)}
.section-divider{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:4px 0;border-bottom:1px solid var(--border);margin-top:4px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:8px 16px;border:1px solid var(--border2);border-radius:6px;background:none;color:var(--text2);font-family:var(--sans);font-size:13px;cursor:pointer}
.btn-cancel:hover{color:var(--text);border-color:var(--text2)}
.btn-apply{padding:8px 20px;border:1px solid var(--accent-border);border-radius:6px;background:var(--accent-dim);color:var(--accent);font-family:var(--sans);font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
.btn-apply:hover{background:rgba(74,222,128,.22)}

/* Keyboard shortcut hints */
.kbd-hint{display:inline-block;font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--surface2);border:1px solid var(--border2);border-radius:3px;padding:1px 5px;margin-left:4px}
</style>
</head>
<body>
<div class="app">
  <!-- Topbar -->
  <div class="topbar">
    <span class="logo">TRAFFIC.COUNT</span>
    <span class="loc-tag" id="locTag" onclick="openSetup()">📍 현장 미설정</span>
    <span class="spacer"></span>
    <button class="topbar-btn" onclick="openSetup()">⚙ 현장 설정</button>
    <button class="topbar-btn green" onclick="exportCSV()">↓ CSV 내보내기</button>
    <button class="topbar-btn green" id="sheetBtn" onclick="sendToSheet()">📊 시트로 전송</button>
    <button class="topbar-btn red" onclick="resetAll()">↺ 초기화</button>
  </div>

  <div class="body">
    <!-- Left: video + log -->
    <div class="video-panel">
      <div id="videoBox">
        <div class="video-drop" id="videoDrop" onclick="document.getElementById('fileInput').click()">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
            <path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          </svg>
          <p>클릭해서 영상 불러오기</p>
          <small>MP4, MOV, AVI 등 지원</small>
        </div>
        <div class="video-box" id="videoWrap" style="display:none">
          <video id="videoEl" controls></video>
        </div>
      </div>
      <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="loadVideo(event)">

      <div class="timebar">
        <span class="timestamp" id="tsDisplay">00:00:00</span>
        <div class="timebar-actions">
          <button class="icon-btn flag" onclick="markTime()" title="시간 마킹 (M)">⚑</button>
        </div>
        <div class="timebar-right">
          기록 총 <strong id="totalRec">0</strong>건
        </div>
      </div>

      <div class="log-section">
        <div class="log-head">기록 로그</div>
        <div class="log-scroll" id="logScroll">
          <div class="log-empty">+ / − 버튼을 눌러 기록을 시작하세요</div>
        </div>
      </div>
    </div>

    <!-- Right: counters -->
    <div class="right-panel" id="rightPanel"></div>
  </div>
</div>

<!-- Setup Modal -->
<div class="modal-bg" id="modalBg" style="display:none" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2>현장 설정</h2>
      <button class="modal-close" onclick="closeSetup()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>현장 이름</label>
        <input type="text" id="fLocName" placeholder="예: 강남역 사거리 A구역">
      </div>
      <div class="section-divider">🚗 번 차선</div>
      <div class="field">
        <label>번 차선 수</label>
        <input type="number" id="fLanes" min="1" max="10" value="3" style="width:80px">
      </div>
      <div class="field">
        <label>번 차선 체크 항목</label>
        <div id="fLaneItems"></div>
        <div class="add-row" onclick="addItem('lane')">＋ 항목 추가</div>
      </div>
      <div class="section-divider">🚶 횡단보도</div>
      <div class="field">
        <label>횡단보도 수</label>
        <input type="number" id="fCrosses" min="0" max="8" value="2" style="width:80px">
      </div>
      <div class="field">
        <label>횡단보도 체크 항목</label>
        <div id="fCrossItems"></div>
        <div class="add-row" onclick="addItem('cross')">＋ 항목 추가</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSetup()">취소</button>
      <button class="btn-apply" onclick="applySetup()">적용하기</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_LANE_ITEMS = ['승용차','오토바이'];
const DEFAULT_CROSS_ITEMS = ['보행자','자전거'];

let cfg = {
  location: '',
  lanes: 3,
  crosses: 2,
  laneItems: [...DEFAULT_LANE_ITEMS],
  crossItems: [...DEFAULT_CROSS_ITEMS]
};

let counts = {};
let logs = [];
let tempLane = [...DEFAULT_LANE_ITEMS];
let tempCross = [...DEFAULT_CROSS_ITEMS];

const video = document.getElementById('videoEl');

function fmt(s) {
  s = Math.max(0, s);
  let h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
  return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
}

function curTime() {
  return (video.style.display !== 'none' && !isNaN(video.currentTime)) ? video.currentTime : 0;
}

function key(type, idx, item) { return `${type}__${idx}__${item}`; }

function buildPanel() {
  counts = {};
  const panel = document.getElementById('rightPanel');
  panel.innerHTML = '';

  for (let i = 1; i <= cfg.lanes; i++) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.innerHTML = `🚗 <span>${i}번 차선</span>`;
    const badge = document.createElement('span');
    badge.className = 'section-badge';
    badge.id = `sec_lane_${i}`;
    lbl.appendChild(badge);
    panel.appendChild(lbl);
    cfg.laneItems.forEach(item => {
      const k = key('lane', i, item);
      counts[k] = 0;
      panel.appendChild(makeRow(k, item));
    });
  }

  for (let i = 1; i <= cfg.crosses; i++) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.innerHTML = `🚶 <span>횡단보도 ${i}</span>`;
    const badge = document.createElement('span');
    badge.className = 'section-badge';
    badge.id = `sec_cross_${i}`;
    lbl.appendChild(badge);
    panel.appendChild(lbl);
    cfg.crossItems.forEach(item => {
      const k = key('cross', i, item);
      counts[k] = 0;
      panel.appendChild(makeRow(k, item));
    });
  }
  updateSectionBadges();
}

function makeRow(k, label) {
  const row = document.createElement('div');
  row.className = 'counter-row';
  row.innerHTML = `
    <span class="counter-name">${label}</span>
    <div class="counter-ctrl">
      <button class="ctrl-btn minus" onclick="change('${k}',-1)">−</button>
      <span class="ctrl-val" id="v_${k}">0</span>
      <button class="ctrl-btn plus" onclick="change('${k}',1)">+</button>
    </div>`;
  return row;
}

function change(k, delta) {
  counts[k] = Math.max(0, (counts[k] || 0) + delta);
  document.getElementById('v_' + k).textContent = counts[k];
  const parts = k.split('__');
  const type = parts[0], idx = parts[1], item = parts[2];
  const sectionName = type === 'lane' ? `${idx}번 차선` : `횡단보도 ${idx}`;
  logs.unshift({ ts: curTime(), type, idx, item, sectionName, delta, val: counts[k] });
  renderLog();
  updateSectionBadges();
}

function markTime() {
  logs.unshift({ ts: curTime(), mark: true });
  renderLog();
}

function updateSectionBadges() {
  for (let i = 1; i <= cfg.lanes; i++) {
    const total = cfg.laneItems.reduce((s, item) => s + (counts[key('lane', i, item)] || 0), 0);
    const el = document.getElementById(`sec_lane_${i}`);
    if (el) el.textContent = total > 0 ? `합계 ${total}` : '';
  }
  for (let i = 1; i <= cfg.crosses; i++) {
    const total = cfg.crossItems.reduce((s, item) => s + (counts[key('cross', i, item)] || 0), 0);
    const el = document.getElementById(`sec_cross_${i}`);
    if (el) el.textContent = total > 0 ? `합계 ${total}` : '';
  }
  document.getElementById('totalRec').textContent = logs.filter(l => !l.mark).length;
}

function renderLog() {
  const el = document.getElementById('logScroll');
  const shown = logs.slice(0, 150);
  if (!shown.length) {
    el.innerHTML = '<div class="log-empty">+ / − 버튼을 눌러 기록을 시작하세요</div>';
    return;
  }
  el.innerHTML = shown.map(e => {
    if (e.mark) return `<div class="log-item"><span class="log-ts">${fmt(e.ts)}</span><span class="log-zone" style="color:#fbbf24">⚑ 시간 마킹</span><span class="log-delta mark">—</span></div>`;
    const cls = e.delta > 0 ? 'up' : 'down';
    const sym = e.delta > 0 ? '+1' : '−1';
    return `<div class="log-item"><span class="log-ts">${fmt(e.ts)}</span><span class="log-zone">${e.sectionName} · ${e.item}</span><span class="log-delta ${cls}">${sym}</span></div>`;
  }).join('');
}

function exportCSV() {
  if (logs.length === 0 && Object.keys(counts).length === 0) {
    alert('아직 기록된 데이터가 없어요.');
    return;
  }
  let rows = [['=== 최종 집계 ===', '', '', '', ''], ['구역', '항목', '합계', '구역 합계', '']];

  // 번 차선별 그룹화하여 소계 포함
  for (let i = 1; i <= cfg.lanes; i++) {
    let laneTotal = 0;
    cfg.laneItems.forEach(item => {
      const k = key('lane', i, item);
      const val = counts[k] || 0;
      laneTotal += val;
      rows.push([`${i}번 차선`, item, val, '', '']);
    });
    rows.push([`${i}번 차선 합계`, '', '', laneTotal, '']);
    rows.push(['', '', '', '', '']);
  }

  // 횡단보도별 그룹화하여 소계 포함
  for (let i = 1; i <= cfg.crosses; i++) {
    let crossTotal = 0;
    cfg.crossItems.forEach(item => {
      const k = key('cross', i, item);
      const val = counts[k] || 0;
      crossTotal += val;
      rows.push([`횡단보도 ${i}`, item, val, '', '']);
    });
    rows.push([`횡단보도 ${i} 합계`, '', '', crossTotal, '']);
    rows.push(['', '', '', '', '']);
  }

  rows.push(['=== 상세 로그 ===', '', '', '', '']);
  rows.push(['타임스탬프', '구역', '항목', '변화', '누적값']);
  [...logs].reverse().forEach(e => {
    if (!e.mark) rows.push([fmt(e.ts), e.sectionName, e.item, e.delta > 0 ? '+1' : '-1', e.val]);
    else rows.push([fmt(e.ts), '마킹', '', '', '']);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const name = cfg.location || '교통량';
  a.download = `${name}_${new Date().toLocaleDateString('ko-KR').replace(/\s|\./g, '')}.csv`;
  a.click();
}

function resetAll() {
  if (!confirm('모든 카운트와 로그를 초기화할까요?')) return;
  logs = [];
  buildPanel();
  renderLog();
}

function loadVideo(e) {
  const file = e.target.files[0];
  if (!file) return;
  video.src = URL.createObjectURL(file);
  video.style.display = 'block';
  document.getElementById('videoDrop').style.display = 'none';
  document.getElementById('videoWrap').style.display = 'block';
  video.ontimeupdate = () => {
    document.getElementById('tsDisplay').textContent = fmt(video.currentTime);
  };
}

// Setup modal
function openSetup() {
  document.getElementById('fLocName').value = cfg.location;
  document.getElementById('fLanes').value = cfg.lanes;
  document.getElementById('fCrosses').value = cfg.crosses;
  tempLane = [...cfg.laneItems];
  tempCross = [...cfg.crossItems];
  renderItemInputs();
  document.getElementById('modalBg').style.display = 'flex';
}

function closeSetup() {
  document.getElementById('modalBg').style.display = 'none';
}

function bgClick(e) {
  if (e.target === document.getElementById('modalBg')) closeSetup();
}

function renderItemInputs() {
  document.getElementById('fLaneItems').innerHTML = tempLane.map((v, i) =>
    `<div class="item-row"><input type="text" value="${v}" oninput="tempLane[${i}]=this.value" placeholder="항목명"><button class="rm-btn" onclick="removeItem('lane',${i})">✕</button></div>`
  ).join('');
  document.getElementById('fCrossItems').innerHTML = tempCross.map((v, i) =>
    `<div class="item-row"><input type="text" value="${v}" oninput="tempCross[${i}]=this.value" placeholder="항목명"><button class="rm-btn" onclick="removeItem('cross',${i})">✕</button></div>`
  ).join('');
}

function addItem(type) {
  if (type === 'lane') { tempLane.push(''); }
  else { tempCross.push(''); }
  renderItemInputs();
}

function removeItem(type, i) {
  if (type === 'lane') { tempLane.splice(i, 1); }
  else { tempCross.splice(i, 1); }
  renderItemInputs();
}

function applySetup() {
  // Read current input values
  document.querySelectorAll('#fLaneItems input').forEach((el, i) => { tempLane[i] = el.value; });
  document.querySelectorAll('#fCrossItems input').forEach((el, i) => { tempCross[i] = el.value; });
  cfg.location = document.getElementById('fLocName').value.trim();
  cfg.lanes = Math.max(1, parseInt(document.getElementById('fLanes').value) || 3);
  cfg.crosses = Math.max(0, parseInt(document.getElementById('fCrosses').value) || 2);
  cfg.laneItems = tempLane.map(v => v.trim()).filter(Boolean);
  cfg.crossItems = tempCross.map(v => v.trim()).filter(Boolean);
  if (!cfg.laneItems.length) cfg.laneItems = ['차량'];
  if (!cfg.crossItems.length) cfg.crossItems = ['보행자'];
  document.getElementById('locTag').textContent = '📍 ' + (cfg.location || '현장 미설정');
  logs = [];
  buildPanel();
  renderLog();
  closeSetup();
}

// Keyboard: M = mark time
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'm' || e.key === 'M') markTime();
});

buildPanel();

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyrIE5U18M64NFeT29zNOmoIcO7c1mcyF-JWTtgHgjJuZ0kfxWHz6HShsqikJieLABFsQ/exec';

async function sendToSheet() {
  if (Object.keys(counts).length === 0) {
    alert('데이터가 없어요. 먼저 카운트를 입력해주세요.');
    return;
  }
  const btn = document.getElementById('sheetBtn');
  btn.textContent = '⏳ 전송 중...';
  btn.disabled = true;

  const rows = [];
  for (let i = 1; i <= cfg.lanes; i++) {
    let zoneTotal = 0;
    cfg.laneItems.forEach(item => {
      const k = key('lane', i, item);
      zoneTotal += counts[k] || 0;
    });
    cfg.laneItems.forEach(item => {
      const k = key('lane', i, item);
      rows.push({ zone: `${i}번 차선`, item, value: counts[k] || 0, zoneTotal });
    });
  }
  for (let i = 1; i <= cfg.crosses; i++) {
    let zoneTotal = 0;
    cfg.crossItems.forEach(item => {
      const k = key('cross', i, item);
      zoneTotal += counts[k] || 0;
    });
    cfg.crossItems.forEach(item => {
      const k = key('cross', i, item);
      rows.push({ zone: `횡단보도 ${i}`, item, value: counts[k] || 0, zoneTotal });
    });
  }

  const payload = {
    type: 'summary',
    location: cfg.location || '현장미설정',
    rows
  };

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    btn.textContent = '✓ 전송 완료!';
    btn.style.borderColor = 'var(--accent-border)';
    btn.style.color = 'var(--accent)';
    btn.style.background = 'var(--accent-dim)';
    setTimeout(() => {
      btn.textContent = '📊 시트로 전송';
      btn.style.borderColor = '';
      btn.style.color = '';
      btn.style.background = '';
      btn.disabled = false;
    }, 3000);
  } catch (err) {
    alert('전송 실패: ' + err.message);
    btn.textContent = '📊 시트로 전송';
    btn.disabled = false;
  }
}
</script>
